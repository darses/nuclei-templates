id: la02-loader-backdoor

info:
  name: La02 Loader - Detect
  severity: high
  author: darses
  description: |
    Malicious JavaScript loader La02 detected. This is a Javascript-based Loader using XOR obfuscation and browser fingerprinting and contains the capability to dynamically load new Javascript code. The loader is observed mostly on compromised Wordpress websites.
  metadata:
    verified: true
    max-requests: 1
    publicwww-query:
      - '"=new TextDecoder" "=new Uint8Array(" "0x0,0x1,0x8,0xff,"'
    urlscan-query:
      - filename:"la02"
  tags: detect,wordpress,backdoor

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"use strict";var '
          - '0x0,0x1,0x8,0xff,"length","undefined"'
          - '0x6,"fromCodePoint",0x7'
          - '=new TextDecoder,'
          - '=new Uint8Array('
          - 'function(){return new Function("return this")()}'
        condition: and

      - type: status
        status:
          - 200
