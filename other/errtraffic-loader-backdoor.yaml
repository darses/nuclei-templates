id: errtraffic-loader-backdoor

info:
  name: ErrTraffic Loader - Detect
  severity: high
  author: darses
  description: |
    Malicious JavaScript loader ErrTraffic detected. This is a Javascript-based loader using browser fingerprinting and contains the capability to dynamically load new Javascript code. The loader is observed mostly on compromised Wordpress websites.
  metadata:
    verified: true
    max-requests: 1
    publicwww-query:
      - 'if(window.TextDecoder){try{return new TextDecoder("utf-8").decode(arr);}catch(e){}}'
  tags: detect,wordpress,backdoor

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'if(window.TextDecoder){try{return new TextDecoder("utf-8").decode(arr);}catch(e){}}'
          - '/wp-includes/'
        condition: and

      - type: status
        status:
          - 200
